  <meta charset="UTF-8" />
  <title>Tamagotchi Guides</title>
  <style>
    .guide-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      font-family: Arial, sans-serif;
    }

    .guide-card {
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      background: #fff;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
